name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Set up Helm
        uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${VERSION}"

      # ── Build cross-platform Go binaries ──
      - name: Build binaries
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          LDFLAGS="-s -w -X main.version=${VERSION}"
          BINARIES=""

          for GOOS in linux darwin; do
            for GOARCH in amd64 arm64; do
              OUTPUT="dist/ghcp-sdk-oai-wrapper-${GOOS}-${GOARCH}"
              echo "Building ${GOOS}/${GOARCH}..."
              CGO_ENABLED=0 GOOS=${GOOS} GOARCH=${GOARCH} \
                go build -ldflags="${LDFLAGS}" -o "${OUTPUT}" ./cmd/server
            done
          done

      - name: Create binary tarballs and checksums
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd dist
          for bin in ghcp-sdk-oai-wrapper-*; do
            TARBALL="${bin}-v${VERSION}.tar.gz"
            tar czf "${TARBALL}" "${bin}"
            rm "${bin}"
          done
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      # ── Build and push Docker image ──
      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # ── Package and push Helm chart ──
      - name: Package and push Helm chart
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Update Chart.yaml with release version
          sed -i "s/^version:.*/version: ${VERSION}/" charts/ghcp-sdk-oai-wrapper/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/ghcp-sdk-oai-wrapper/Chart.yaml

          echo "Chart.yaml after version update:"
          cat charts/ghcp-sdk-oai-wrapper/Chart.yaml

          helm package charts/ghcp-sdk-oai-wrapper/ --destination dist/
          helm push dist/ghcp-sdk-oai-wrapper-${VERSION}.tgz oci://${{ env.REGISTRY }}/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')/charts

      # ── Create GitHub Release ──
      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
