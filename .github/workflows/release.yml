name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write      # cosign keyless signing via Sigstore OIDC
  attestations: write  # GitHub build provenance attestations

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ────────────────────────────────────────────────────────
  # Gate: run tests and lint before producing any artifacts
  # ────────────────────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Lint
        run: make lint

      - name: Go vulnerability check
        continue-on-error: true # stdlib vulns require a Go patch release to fix
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # ────────────────────────────────────────────────────────
  # Build cross-platform Go binaries
  # ────────────────────────────────────────────────────────
  binaries:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          LDFLAGS="-s -w -X main.version=${VERSION}"
          for GOOS in linux darwin; do
            for GOARCH in amd64 arm64; do
              OUTPUT="dist/ghcp-sdk-oai-wrapper-${GOOS}-${GOARCH}"
              echo "Building ${GOOS}/${GOARCH}..."
              CGO_ENABLED=0 GOOS=${GOOS} GOARCH=${GOARCH} \
                go build -ldflags="${LDFLAGS}" -trimpath -o "${OUTPUT}" ./cmd/server
            done
          done

      - name: Create tarballs and checksums
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd dist
          for bin in ghcp-sdk-oai-wrapper-*; do
            TARBALL="${bin}-v${VERSION}.tar.gz"
            tar czf "${TARBALL}" "${bin}"
            rm "${bin}"
          done
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Upload binary artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: binaries
          path: dist/
          retention-days: 1

  # ────────────────────────────────────────────────────────
  # Build, push, scan, sign, and attest Docker image
  # ────────────────────────────────────────────────────────
  docker:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # Multi-arch builds need QEMU for cross-platform emulation
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate OCI-compliant image labels and tags
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
          labels: |
            org.opencontainers.image.title=ghcp-sdk-oai-wrapper
            org.opencontainers.image.description=GitHub Copilot SDK to OpenAI API wrapper
            org.opencontainers.image.vendor=olohmann

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      # ── Vulnerability scanning ──
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          timeout: 10m

      # ── Keyless image signing with Sigstore/cosign ──
      - name: Install cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3

      - name: Sign image with cosign
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"

      # ── GitHub build provenance attestation ──
      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # ────────────────────────────────────────────────────────
  # Package and push Helm chart as OCI artifact
  # ────────────────────────────────────────────────────────
  helm:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Helm
        uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a # v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to OCI registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login "${{ env.REGISTRY }}" \
              --username "${{ github.actor }}" \
              --password-stdin

      - name: Update Chart.yaml version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" charts/ghcp-sdk-oai-wrapper/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/ghcp-sdk-oai-wrapper/Chart.yaml
          echo "Chart.yaml:"
          cat charts/ghcp-sdk-oai-wrapper/Chart.yaml

      - name: Lint Helm chart
        run: helm lint ./charts/ghcp-sdk-oai-wrapper/

      - name: Package and push Helm chart
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          helm package charts/ghcp-sdk-oai-wrapper/ --destination dist/
          helm push dist/ghcp-sdk-oai-wrapper-${VERSION}.tgz \
            oci://${{ env.REGISTRY }}/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')/charts

      - name: Upload Helm chart artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: helm-chart
          path: dist/*.tgz
          retention-days: 1

  # ────────────────────────────────────────────────────────
  # Create GitHub Release with all artifacts
  # ────────────────────────────────────────────────────────
  github-release:
    needs: [binaries, docker, helm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: binaries
          path: dist/

      - name: Download Helm chart artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: helm-chart
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
            dist/*.tgz
          body: |
            ## Docker Image

            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.docker.outputs.version }}
            ```

            **Image digest:** `${{ needs.docker.outputs.digest }}`

            ### Verify image signature

            ```bash
            cosign verify \
              --certificate-identity-regexp "https://github.com/${{ github.repository }}/" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.docker.outputs.digest }}
            ```

            ### Verify build provenance

            ```bash
            gh attestation verify \
              oci://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.docker.outputs.digest }} \
              --owner ${{ github.repository_owner }}
            ```

            ## Helm Chart (OCI)

            ```bash
            helm install copilot-proxy \
              oci://${{ env.REGISTRY }}/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')/charts/ghcp-sdk-oai-wrapper \
              --version ${{ needs.docker.outputs.version }}
            ```
